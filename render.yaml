services:
  - type: worker
    name: nifty-oi-bot
    plan: free
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "bash start.sh"
    autoDeploy: true
    envVars:
      - key: WHATSAPP_ENABLED
        value: "False"
      # Telegram secrets — set these in Render dashboard, not here
      # - key: TELEGRAM_TOKEN
      #   value: "SET_IN_DASHBOARD"
      # - key: TELEGRAM_CHAT_ID
      #   value: "SET_IN_DASHBOARD"
